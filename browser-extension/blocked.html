<!DOCTYPE html>
<html>
<head>
  <title>Focus Mode Active</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #f3f4f6;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      color: #1f2937;
    }
    .container {
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      text-align: center;
      max-width: 400px;
    }
    h1 { margin-bottom: 16px; color: #4338ca; }
    p { color: #6b7280; margin-bottom: 24px; line-height: 1.5; }
    .icon { font-size: 64px; margin-bottom: 16px; }
    .btn {
      background-color: #4f46e5;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }
    .btn:hover { background-color: #4338ca; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🚫</div>
    <h1>Focus Mode Active</h1>
    <p>This site is not on your <strong>Allowlist</strong>.<br>Get back to studying and crush your goals!</p>
    <a href="http://localhost:5173" class="btn">Go to Dashboard</a>
  </div>
</body>
</html>
