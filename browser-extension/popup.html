<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudyPulse Focus Tracker</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 350px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .container {
      padding: 20px;
    }

    .header {
      text-align: center;
      margin-bottom: 20px;
    }

    .header h1 {
      font-size: 24px;
      margin-bottom: 5px;
    }

    .header p {
      font-size: 12px;
      opacity: 0.9;
    }

    .section {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 15px;
    }

    .section h3 {
      font-size: 14px;
      margin-bottom: 10px;
      opacity: 0.9;
    }

    .toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .toggle label {
      font-size: 14px;
    }

    .switch {
      position: relative;
      width: 50px;
      height: 26px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(255, 255, 255, 0.3);
      transition: 0.3s;
      border-radius: 26px;
    }

    .slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 4px;
      bottom: 4px;
      background-color: white;
      transition: 0.3s;
      border-radius: 50%;
    }

    input:checked + .slider {
      background-color: #4CAF50;
    }

    input:checked + .slider:before {
      transform: translateX(24px);
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .stat {
      background: rgba(255, 255, 255, 0.15);
      padding: 10px;
      border-radius: 8px;
      text-align: center;
    }

    .stat-value {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 5px;
    }

    .stat-label {
      font-size: 11px;
      opacity: 0.8;
    }

    .blocked-list {
      max-height: 150px;
      overflow-y: auto;
      margin-top: 10px;
    }

    .blocked-item {
      background: rgba(255, 255, 255, 0.1);
      padding: 8px;
      border-radius: 6px;
      margin-bottom: 5px;
      font-size: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .remove-btn {
      background: rgba(255, 0, 0, 0.3);
      border: none;
      color: white;
      padding: 4px 8px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
    }

    .add-site {
      display: flex;
      gap: 5px;
      margin-top: 10px;
    }

    .add-site input {
      flex: 1;
      padding: 8px;
      border: none;
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.2);
      color: white;
      font-size: 12px;
    }

    .add-site input::placeholder {
      color: rgba(255, 255, 255, 0.6);
    }

    .add-site button {
      background: rgba(255, 255, 255, 0.3);
      border: none;
      color: white;
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: bold;
    }

    .sync-btn {
      width: 100%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: 2px solid white;
      color: white;
      padding: 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
      margin-top: 10px;
    }

    .sync-btn:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>⚡ StudyPulse</h1>
      <p>Focus Tracker & Website Blocker</p>
    </div>

    <div class="section">
      <div class="toggle">
        <label>🎯 Focus Mode</label>
        <label class="switch">
          <input type="checkbox" id="focusModeToggle">
          <span class="slider"></span>
        </label>
      </div>
      <p style="font-size: 11px; opacity: 0.8;">Block distracting websites while studying</p>
    </div>

    <div class="section">
      <h3>📊 Today's Stats</h3>
      <div class="stats">
        <div class="stat">
          <div class="stat-value" id="totalTime">0h</div>
          <div class="stat-label">Total Time</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="sitesVisited">0</div>
          <div class="stat-label">Sites Visited</div>
        </div>
      </div>
    </div>

    <div class="section">
      <h3>🚫 Blocked Sites</h3>
      <div class="blocked-list" id="blockedList"></div>
      <div class="add-site">
        <input type="text" id="newSite" placeholder="e.g., facebook.com">
        <button onclick="addSite()">Add</button>
      </div>
    </div>

    <button class="sync-btn" onclick="syncToApp()">
      🔄 Sync to StudyPulse App
    </button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
